server:
  port: 8080

spring:
  application:
    name: rag-knowledgehub
  datasource:
    url: jdbc:mysql://mysql:3306/rag_knowledgehub?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB
      max-request-size: 60MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.rag.knowledgehub: info

app:
  upload-dir: /app/uploads
  jwt:
    secret: 0123456789abcdef0123456789abcdef
    expire-hours: 24
  rag:
    chunk-size: 600
    chunk-overlap: 120
    top-k: 5
  llm:
    base-url: ${LLM_BASE_URL:https://api.openai.com}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-3.5-turbo}
  embedding:
    base-url: http://embedding-service:8001
    model: all-MiniLM-L6-v2
  elasticsearch:
    base-url: http://elasticsearch:9200
    username:
    password:
    index-name: rag_chunks

knife4j:
  enable: true
